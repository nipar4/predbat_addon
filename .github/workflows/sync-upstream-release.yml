name: Sync Upstream Predbat Release

on:
  schedule:
    - cron: '0 */2 * * *'   
  workflow_dispatch:       # Allow manual trigger

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false  # Let the running build finish; queue rather than kill

jobs:
  check-and-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version_changed: ${{ steps.compare.outputs.changed }}
      new_version: ${{ steps.upstream.outputs.tag }}
      commit_sha: ${{ steps.push.outputs.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest upstream release tag
        id: upstream
        run: |
          set -euo pipefail
          LATEST=$(curl -sf \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/springfall2008/batpred/releases/latest \
            | jq -r '.tag_name')
          if [ -z "$LATEST" ] || [ "$LATEST" = "null" ]; then
            echo "Failed to fetch latest upstream release tag"
            exit 1
          fi
          echo "Latest upstream release: $LATEST"
          echo "tag=$LATEST" >> $GITHUB_OUTPUT

      - name: Read current version
        id: current
        run: |
          CURRENT=$(cat predbat_version.txt | tr -d '[:space:]')
          echo "Current version: $CURRENT"
          echo "version=$CURRENT" >> $GITHUB_OUTPUT

      - name: Compare versions
        id: compare
        run: |
          if [ "${{ steps.upstream.outputs.tag }}" != "${{ steps.current.outputs.version }}" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Update version file
        if: steps.compare.outputs.changed == 'true'
        run: |
          echo "${{ steps.upstream.outputs.tag }}" > predbat_version.txt
          echo "Updated predbat_version.txt to ${{ steps.upstream.outputs.tag }}"

      - name: Commit and push updated version
        id: push
        if: steps.compare.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add predbat_version.txt
          git commit -m "chore: bump predbat version to ${{ steps.upstream.outputs.tag }}"
          git pull --rebase
          git push
          echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

  build:
    needs: check-and-sync
    if: needs.check-and-sync.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: noble
            dockerfile: Dockerfile.noble
            tag_suffix: ""
          - variant: alpine
            dockerfile: Dockerfile.alpine
            tag_suffix: "alpine-"
          - variant: slim
            dockerfile: Dockerfile.slim
            tag_suffix: "slim-"

    env:
      USER: ${{ secrets.DOCKERHUB_USERNAME }}
      PREDBAT_VERSION: ${{ needs.check-and-sync.outputs.new_version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.check-and-sync.outputs.commit_sha }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.variant }} image
        uses: docker/build-push-action@v6
        with:
          context: ./predbat/
          file: ./predbat/${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64,linux/arm/v7,linux/arm/v8
          push: true
          tags: |
            ${{ env.USER }}/predbat_addon:${{ matrix.tag_suffix }}latest
            ${{ env.USER }}/predbat_addon:${{ matrix.tag_suffix }}${{ env.PREDBAT_VERSION }}
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            PREDBAT_VERSION=${{ env.PREDBAT_VERSION }}
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,scope=${{ matrix.variant }},mode=max

  release:
    needs: [check-and-sync, build]
    if: needs.check-and-sync.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      PREDBAT_VERSION: ${{ needs.check-and-sync.outputs.new_version }}

    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.PREDBAT_VERSION }}
          name: Based on Predbat Version ${{ env.PREDBAT_VERSION }}
          body: |
            🔧 Built with predbat version `${{ env.PREDBAT_VERSION }}`
