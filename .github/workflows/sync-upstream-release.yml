name: Sync Upstream Predbat Release

on:
  schedule:
    - cron: '0 * * * *'   # Run every hour
  workflow_dispatch:       # Allow manual trigger

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-and-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version_changed: ${{ steps.compare.outputs.changed }}
      new_version: ${{ steps.upstream.outputs.tag }}
      commit_sha: ${{ steps.push.outputs.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest upstream release tag
        id: upstream
        run: |
          set -euo pipefail
          LATEST=$(curl -sf \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/springfall2008/batpred/releases/latest \
            | jq -r '.tag_name')
          if [ -z "$LATEST" ] || [ "$LATEST" = "null" ]; then
            echo "Failed to fetch latest upstream release tag"
            exit 1
          fi
          echo "Latest upstream release: $LATEST"
          echo "tag=$LATEST" >> $GITHUB_OUTPUT

      - name: Read current version
        id: current
        run: |
          CURRENT=$(cat predbat_version.txt | tr -d '[:space:]')
          echo "Current version: $CURRENT"
          echo "version=$CURRENT" >> $GITHUB_OUTPUT

      - name: Compare versions
        id: compare
        run: |
          if [ "${{ steps.upstream.outputs.tag }}" != "${{ steps.current.outputs.version }}" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Update version file
        if: steps.compare.outputs.changed == 'true'
        run: |
          echo "${{ steps.upstream.outputs.tag }}" > predbat_version.txt
          echo "Updated predbat_version.txt to ${{ steps.upstream.outputs.tag }}"

      - name: Commit and push updated version
        id: push
        if: steps.compare.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add predbat_version.txt
          git commit -m "chore: bump predbat version to ${{ steps.upstream.outputs.tag }}"
          git pull --rebase
          git push
          echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

  build:
    needs: check-and-sync
    if: needs.check-and-sync.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    env:
      DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USERNAME }}
      GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/predbat_addon
      PREDBAT_VERSION: ${{ needs.check-and-sync.outputs.new_version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.check-and-sync.outputs.commit_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create local cache folders
        run: |
          mkdir -p /tmp/.buildx-cache-noble
          mkdir -p /tmp/.buildx-cache-alpine
          mkdir -p /tmp/.buildx-cache-slim

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Noble image
        run: |
          docker buildx build \
            --build-arg BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --build-arg PREDBAT_VERSION=$PREDBAT_VERSION \
            --platform linux/amd64,linux/arm64,linux/arm/v7,linux/arm/v8 \
            --file ./predbat/Dockerfile.noble \
            --tag $DOCKERHUB_USER/predbat_addon:latest \
            --tag $DOCKERHUB_USER/predbat_addon:${PREDBAT_VERSION} \
            --tag $GHCR_IMAGE:latest \
            --tag $GHCR_IMAGE:${PREDBAT_VERSION} \
            --cache-from=type=local,src=/tmp/.buildx-cache-noble \
            --cache-to=type=local,dest=/tmp/.buildx-cache-noble \
            --push \
            ./predbat/

      - name: Build and push alpine image
        run: |
          docker buildx build \
            --build-arg BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --build-arg PREDBAT_VERSION=$PREDBAT_VERSION \
            --platform linux/amd64,linux/arm64,linux/arm/v7,linux/arm/v8 \
            --file ./predbat/Dockerfile.alpine \
            --tag $DOCKERHUB_USER/predbat_addon:alpine-latest \
            --tag $DOCKERHUB_USER/predbat_addon:alpine-${PREDBAT_VERSION} \
            --tag $GHCR_IMAGE:alpine-latest \
            --tag $GHCR_IMAGE:alpine-${PREDBAT_VERSION} \
            --cache-from=type=local,src=/tmp/.buildx-cache-alpine \
            --cache-to=type=local,dest=/tmp/.buildx-cache-alpine \
            --push \
            ./predbat/

      - name: Build and push slim image
        run: |
          docker buildx build \
            --build-arg BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --build-arg PREDBAT_VERSION=$PREDBAT_VERSION \
            --platform linux/amd64,linux/arm64,linux/arm/v7,linux/arm/v8 \
            --file ./predbat/Dockerfile.slim \
            --tag $DOCKERHUB_USER/predbat_addon:slim-latest \
            --tag $DOCKERHUB_USER/predbat_addon:slim-${PREDBAT_VERSION} \
            --tag $GHCR_IMAGE:slim-latest \
            --tag $GHCR_IMAGE:slim-${PREDBAT_VERSION} \
            --cache-from=type=local,src=/tmp/.buildx-cache-slim \
            --cache-to=type=local,dest=/tmp/.buildx-cache-slim \
            --push \
            ./predbat/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.PREDBAT_VERSION }}
          name: Based on Predbat Version ${{ env.PREDBAT_VERSION }}
          body: |
            🔧 Built with predbat version `${{ env.PREDBAT_VERSION }}`
