name: Sync Upstream Predbat Addon

on:
  schedule:
    - cron: '0 7 * * *'   # Daily at 07:00 UTC (offset from predbat sync)
  workflow_dispatch:        # Allow manual trigger

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check-and-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write   # for failure notification on conflict
      actions: write  # for gh workflow run sync-predbat.yml

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0   # full history needed for merge

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/springfall2008/predbat_addon.git
          git fetch upstream

      - name: Detect if update available
        id: check
        run: |
          LOCAL=$(git rev-parse main)
          REMOTE=$(git rev-parse upstream/main)
          if [ "$LOCAL" = "$REMOTE" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Merge upstream/main
        if: steps.check.outputs.changed == 'true'
        id: merge
        run: |
          git checkout main
          if ! git merge upstream/main --no-edit; then
            git merge --abort
            echo "conflict=true" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          echo "conflict=false" >> "$GITHUB_OUTPUT"

      - name: Update addon version
        if: steps.check.outputs.changed == 'true' && steps.merge.outputs.conflict == 'false'
        id: addon_version
        run: |
          set -euo pipefail
          LATEST=$(curl -sf \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/springfall2008/predbat_addon/releases/latest \
            | jq -r '.tag_name')
          if [ -z "$LATEST" ] || [ "$LATEST" = "null" ]; then
            echo "Failed to fetch latest upstream addon release tag"
            exit 1
          fi
          sed -i "s/^ADDON_VERSION=.*/ADDON_VERSION=${LATEST}/" versions.env
          echo "tag=${LATEST}" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.check.outputs.changed == 'true' && steps.merge.outputs.conflict == 'false'
        run: |
          if ! git diff --quiet versions.env; then
            git add versions.env
            git commit -m "chore: bump addon version to ${{ steps.addon_version.outputs.tag }}"
          fi
          git pull --rebase
          git push origin main

      - name: Trigger predbat sync build
        if: steps.check.outputs.changed == 'true' && steps.merge.outputs.conflict == 'false'
        run: gh workflow run sync-predbat.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Open issue on conflict
        if: failure() && steps.check.outputs.changed == 'true'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Upstream addon merge conflict - ${new Date().toISOString().slice(0,10)}`,
              body: `Automated merge from \`springfall2008/predbat_addon\` (main) failed due to a conflict.\n\nManual resolution required:\n\`\`\`bash\ngit remote add upstream https://github.com/springfall2008/predbat_addon.git\ngit fetch upstream\ngit checkout main\ngit merge upstream/main\n# resolve conflicts\ngit push origin main\n\`\`\`\n\nWorkflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['upstream-sync', 'conflict']
            });