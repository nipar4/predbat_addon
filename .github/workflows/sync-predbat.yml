name: Sync Upstream Predbat Release

on:
  schedule:
    - cron: '0 * * * *'   
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'predbat/requirements.txt'
      - 'versions.env'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false  # Let the running build finish; queue rather than kill

jobs:
  check-and-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version_changed: ${{ steps.compare.outputs.changed }}
      new_version: ${{ steps.upstream.outputs.tag }}
      addon_version: ${{ steps.addon_version.outputs.addon_version }}
      commit_sha: ${{ steps.push.outputs.sha }}
      addon_triggered: ${{ steps.trigger.outputs.addon_triggered }}
      addon_current: ${{ steps.addon_check.outputs.addon_current }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Detect trigger source
        id: trigger
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "addon_triggered=true" >> "$GITHUB_OUTPUT"
          else
            echo "addon_triggered=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Get latest upstream release tag
        id: upstream
        run: |
          set -euo pipefail
          LATEST=$(curl -sf \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/springfall2008/batpred/releases/latest \
            | jq -r '.tag_name')
          if [ -z "$LATEST" ] || [ "$LATEST" = "null" ]; then
            echo "Failed to fetch latest upstream release tag"
            exit 1
          fi
          echo "Latest upstream release: $LATEST"
          echo "tag=$LATEST" >> "$GITHUB_OUTPUT"

      - name: Read current version
        id: current
        run: |
          source versions.env
          PREDBAT_VERSION_CLEAN=$(echo "$PREDBAT_VERSION" | tr -d '[:space:]')
          echo "Current version: $PREDBAT_VERSION_CLEAN"
          echo "predbat_version=$PREDBAT_VERSION_CLEAN" >> "$GITHUB_OUTPUT"

      - name: Read addon version
        id: addon_version
        run: |
          source versions.env
          ADDON_VERSION_CLEAN=$(echo "$ADDON_VERSION" | tr -d '[:space:]')
          echo "Addon version: $ADDON_VERSION_CLEAN"
          echo "addon_version=$ADDON_VERSION_CLEAN" >> "$GITHUB_OUTPUT"

      - name: Check addon is current
        id: addon_check
        run: |
          set -euo pipefail
          LATEST_ADDON=$(curl -sf \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/springfall2008/predbat_addon/releases/latest \
            | jq -r '.tag_name')
          if [ -z "$LATEST_ADDON" ] || [ "$LATEST_ADDON" = "null" ]; then
            echo "Failed to fetch latest upstream addon release tag"
            exit 1
          fi
          if [ "$LATEST_ADDON" != "${{ steps.addon_version.outputs.addon_version }}" ]; then
            echo "Addon out of date: have ${{ steps.addon_version.outputs.addon_version }}, upstream is $LATEST_ADDON - skipping build until addon sync catches up"
            echo "addon_current=false" >> "$GITHUB_OUTPUT"
          else
            echo "addon_current=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Compare versions
        id: compare
        run: |
          if [ "${{ steps.upstream.outputs.tag }}" != "${{ steps.current.outputs.predbat_version }}" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update version file
        if: steps.compare.outputs.changed == 'true'
        run: |
          sed -i "s/^PREDBAT_VERSION=.*/PREDBAT_VERSION=${{ steps.upstream.outputs.tag }}/" versions.env
          echo "Updated versions.env to ${{ steps.upstream.outputs.tag }}"

      - name: Commit and push updated version
        id: push
        if: steps.compare.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add versions.env
          git commit -m "chore: bump predbat version to ${{ steps.upstream.outputs.tag }}"
          git pull --rebase
          git push
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  build:
    needs: check-and-sync
    if: github.event_name == 'workflow_dispatch' || (needs.check-and-sync.outputs.addon_current == 'true' && (needs.check-and-sync.outputs.version_changed == 'true' || needs.check-and-sync.outputs.addon_triggered == 'true'))
    runs-on: ubuntu-latest
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: noble
            dockerfile: Dockerfile.noble
            tag_suffix: ""
          - variant: alpine
            dockerfile: Dockerfile.alpine
            tag_suffix: "alpine-"
          - variant: slim
            dockerfile: Dockerfile.slim
            tag_suffix: "slim-"

    env:
      USER: ${{ secrets.DOCKERHUB_USERNAME }}
      PREDBAT_VERSION: ${{ needs.check-and-sync.outputs.new_version }}
      ADDON_VERSION: ${{ needs.check-and-sync.outputs.addon_version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.check-and-sync.outputs.commit_sha || github.sha }}

      - name: Validate version
        run: |
          [ -n "${{ env.PREDBAT_VERSION }}" ] || { echo "Empty predbat version!"; exit 1; }
          [ -n "${{ env.ADDON_VERSION }}" ] || { echo "Empty addon version!"; exit 1; }

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set build date
        id: date
        run: echo "value=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> "$GITHUB_OUTPUT"
          
      - name: Build and push ${{ matrix.variant }} image
        uses: docker/build-push-action@v7
        with:
          context: ./predbat/
          file: ./predbat/${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.USER }}/predbat_addon:${{ matrix.tag_suffix }}latest
            ${{ env.USER }}/predbat_addon:${{ matrix.tag_suffix }}${{ env.PREDBAT_VERSION }}
          build-args: |
            BUILD_DATE=${{ steps.date.outputs.value }}
            PREDBAT_VERSION=${{ env.PREDBAT_VERSION }}
            ADDON_VERSION=${{ env.ADDON_VERSION }}
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,scope=${{ matrix.variant }},mode=max
          provenance: true
          sbom: true

  release:
    needs: [check-and-sync, build]
    if: github.event_name == 'workflow_dispatch' || (needs.check-and-sync.outputs.addon_current == 'true' && (needs.check-and-sync.outputs.version_changed == 'true' || needs.check-and-sync.outputs.addon_triggered == 'true'))
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      PREDBAT_VERSION: ${{ needs.check-and-sync.outputs.new_version }}
      ADDON_VERSION: ${{ needs.check-and-sync.outputs.addon_version }}

    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.PREDBAT_VERSION }}
          name: Based on Predbat Version ${{ env.PREDBAT_VERSION }}
          body: |
            🔧 Built with predbat version `${{ env.PREDBAT_VERSION }}`
            📦 Addon base version `${{ env.ADDON_VERSION }}`