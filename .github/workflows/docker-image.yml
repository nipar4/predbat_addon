name: Build and Push Multiple Docker Images

on:
  workflow_dispatch:  # Disabled - manual trigger only

#on:
#  push:
#    paths:
#      - 'versions.env'   # Trigger only when this file changes

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: noble
            dockerfile: Dockerfile.noble
            tag_suffix: ""
          - variant: alpine
            dockerfile: Dockerfile.alpine
            tag_suffix: "alpine-"
          - variant: slim
            dockerfile: Dockerfile.slim
            tag_suffix: "slim-"

    env:
      USER: ${{ secrets.DOCKERHUB_USERNAME }}

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Read version
        run: |
          source versions.env
          echo "PREDBAT_VERSION=$PREDBAT_VERSION" >> "$GITHUB_ENV"
          echo "S6_VERSION=$S6_VERSION" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.variant }} image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ./predbat/
          file: ./predbat/${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.USER }}/predbat_addon:${{ matrix.tag_suffix }}latest
            ${{ env.USER }}/predbat_addon:${{ matrix.tag_suffix }}${{ env.PREDBAT_VERSION }}
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            PREDBAT_VERSION=${{ env.PREDBAT_VERSION }}
            S6_VERSION=${{ env.S6_VERSION }}
          cache-from: type=gha,scope=push-${{ matrix.variant }}
          cache-to: type=gha,scope=push-${{ matrix.variant }},mode=max

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Read version
        run: |
          source versions.env
          echo "PREDBAT_VERSION=$PREDBAT_VERSION" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ env.PREDBAT_VERSION }}
          name: Based on Predbat Version ${{ env.PREDBAT_VERSION }}
          body: |
            🔧 Built with predbat version `${{ env.PREDBAT_VERSION }}`