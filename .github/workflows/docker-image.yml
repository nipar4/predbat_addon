name: Build and Push Multiple Docker Images

on:
  push:
    paths:
      - 'predbat_version.txt'   # Trigger only when this file changes

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: noble
            dockerfile: Dockerfile.noble
            tag_suffix: ""          # noble is the default/latest
          - variant: alpine
            dockerfile: Dockerfile.alpine
            tag_suffix: "alpine-"
          - variant: slim
            dockerfile: Dockerfile.slim
            tag_suffix: "slim-"

    env:
      GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/predbat_addon

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read version
        run: |
          PREDBAT_VERSION=$(cat predbat_version.txt | tr -d '[:space:]')
          echo "PREDBAT_VERSION=$PREDBAT_VERSION" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.variant }} image
        uses: docker/build-push-action@v6
        with:
          context: ./predbat/
          file: ./predbat/${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64,linux/arm/v7,linux/arm/v8
          push: true
          tags: |
            ${{ env.GHCR_IMAGE }}:${{ matrix.tag_suffix }}latest
            ${{ env.GHCR_IMAGE }}:${{ matrix.tag_suffix }}${{ env.PREDBAT_VERSION }}
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            PREDBAT_VERSION=${{ env.PREDBAT_VERSION }}
          cache-from: |
            type=gha,scope=${{ matrix.variant }}
            type=registry,ref=${{ env.GHCR_IMAGE }}:${{ matrix.tag_suffix }}latest
          cache-to: type=gha,scope=${{ matrix.variant }},mode=max

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read version
        run: |
          PREDBAT_VERSION=$(cat predbat_version.txt | tr -d '[:space:]')
          echo "PREDBAT_VERSION=$PREDBAT_VERSION" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.PREDBAT_VERSION }}
          name: Based on Predbat Version ${{ env.PREDBAT_VERSION }}
          body: |
            🔧 Built with predbat version `${{ env.PREDBAT_VERSION }}`
